<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natureza — Portfólio Diogo</title>
  <link rel="stylesheet" href="index.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <header class="pokedex-header">
    <div class="header-content">
      <div class="logo-area">
        <img id="theme-pokemon-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pokémon" />
      </div>
      <div class="type-buttons-wrapper">
        <div class="type-buttons-scroll">
          <button class="type-icon type-normal" onclick="changeTheme('normal')" title="Normal">NRM</button>
          <button class="type-icon type-fire" onclick="changeTheme('fire')" title="Fire">FIR</button>
          <button class="type-icon type-water" onclick="changeTheme('water')" title="Water">WAT</button>
          <button class="type-icon type-grass" onclick="changeTheme('grass')" title="Grass">GRS</button>
          <button class="type-icon type-electric" onclick="changeTheme('electric')" title="Electric">ELE</button>
          <button class="type-icon type-ice" onclick="changeTheme('ice')" title="Ice">ICE</button>
          <button class="type-icon type-fighting" onclick="changeTheme('fighting')" title="Fighting">FIG</button>
          <button class="type-icon type-poison" onclick="changeTheme('poison')" title="Poison">POI</button>
          <button class="type-icon type-ground" onclick="changeTheme('ground')" title="Ground">GRD</button>
          <button class="type-icon type-flying" onclick="changeTheme('flying')" title="Flying">FLY</button>
          <button class="type-icon type-psychic" onclick="changeTheme('psychic')" title="Psychic">PSY</button>
          <button class="type-icon type-bug" onclick="changeTheme('bug')" title="Bug">BUG</button>
          <button class="type-icon type-rock" onclick="changeTheme('rock')" title="Rock">ROK</button>
          <button class="type-icon type-ghost" onclick="changeTheme('ghost')" title="Ghost">GHO</button>
          <button class="type-icon type-dragon" onclick="changeTheme('dragon')" title="Dragon">DRG</button>
          <button class="type-icon type-dark" onclick="changeTheme('dark')" title="Dark">DRK</button>
          <button class="type-icon type-steel" onclick="changeTheme('steel')" title="Steel">STL</button>
          <button class="type-icon type-fairy" onclick="changeTheme('fairy')" title="Fairy">FAI</button>
        </div>
      </div>
      <div class="header-titles">
        <h1>Natureza</h1>
        <div class="nav-links">
          <a href="Index.html">← Início</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="page-section active">

      <p class="page-breadcrumb">Ensino Médio</p>
      <h1 class="section-title pixel-text text-center">Ciências da Natureza</h1>

      <div class="div-card-flex">

        <!-- Atividade 1: Bio - Meme Evolucionismo (placeholder) -->
        <div class="card-atividade">
          <div class="card-placeholder-inner">Atividade em breve</div>
          <h3 class="atividade-title">Meme Evolucionismo</h3>
          <p class="atividade-habilidades">C3: H15 H18</p>
        </div>

        <!-- Atividade 2: Química - Combustíveis Fósseis -->
        <div class="card-atividade">
          <div style="position: relative; width: 100%; height: 0; padding-top: 56.25%; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-bottom: 14px; overflow: hidden; border-radius: 10px; will-change: transform;">
            <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;"
              src="https://www.canva.com/design/DAHFbBTGSEI/1SjuV6-thQ41z9G2ECfVnQ/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
            </iframe>
          </div>
          <h3 class="atividade-title">Combustíveis Fósseis</h3>
          <p class="atividade-habilidades">C1: H1 &nbsp;|&nbsp; C2: H9 H11</p>
        </div>

      </div>

    </section>
  </main>

</body>
</html>
